# .github/workflows/deploy.yml
# Version: 1.2.1 | 2026-06-17 17:20 AEST
# Update notes: Hardened SSH deploy after failure. Explicit key file (-i), more debug output,
# StrictHostKeyChecking=no for reliable CI (ephemeral runners), better error messages,
# key validity check, and kept the Node 24 force. New assets (logos, lightbox etc.) deploy fine.

name: Deploy to Hostinger (SSH rsync)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Debug: show key info (first line + size)
          echo "=== SSH Key Debug ==="
          head -c 100 ~/.ssh/id_ed25519 | cat -A || true
          echo ""
          echo "SSH key file size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          ls -l ~/.ssh/id_ed25519

          if [ ! -s ~/.ssh/id_ed25519 ]; then
            echo "❌ ERROR: SSH private key is empty or missing!"
            echo "   → Check that secret HOSTINGER_SSH_KEY_B64 exists and is valid base64 of the ed25519 private key."
            exit 1
          fi

          # Populate known hosts (best effort)
          ssh-keyscan -p 65002 -H 46.202.196.151 >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Known hosts file:"
          cat ~/.ssh/known_hosts || true

      - name: Verify SSH connection
        run: |
          echo "=== Verifying SSH to Hostinger ==="
          ssh -i ~/.ssh/id_ed25519 -p 65002 \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            u566466219@46.202.196.151 \
            "echo '✅ SSH connection successful from GitHub runner at $(date)' && whoami && pwd" \
            || (echo "❌ SSH verification FAILED." \
                echo "Check the following:" \
                echo "  1. GitHub secret HOSTINGER_SSH_KEY_B64 is set (repo or coldix org)" \
                echo "  2. The private key's public half is in the server's ~/.ssh/authorized_keys" \
                echo "  3. Target dir exists and is writable: /home/u566466219/domains/bellwest.au/public_html/" \
                echo "  4. Key was base64 encoded correctly (no extra newlines)" \
                exit 1)

      - name: Deploy via rsync over SSH
        run: |
          echo "=== Starting rsync deploy ==="
          rsync -av --progress \
            -e "ssh -i ~/.ssh/id_ed25519 -p 65002 \
                 -o BatchMode=yes \
                 -o ConnectTimeout=20 \
                 -o StrictHostKeyChecking=no \
                 -o UserKnownHostsFile=/dev/null" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            ./ u566466219@46.202.196.151:/home/u566466219/domains/bellwest.au/public_html/

          echo "✅ Deploy completed successfully"
